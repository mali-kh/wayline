apiVersion: wl.io/v1
kind: ODAGTemplate
metadata:
  name: dag-pipeline
  namespace: wl-system
spec:
  description: "3-stage pipeline: generate → transform → output"
  scheduler: heft
  profiling:
    enabled: true
    warmupRuns: 0
    minSamples: 2
    emaAlpha: 0.3
    maxSamples: 50
  defaults:
    runtime: 10
    dataSize: "1MB"
  retention:
    maxRuns: 10
    data:
      policy: keepLatest
      keepRuns: 3
  tasks:
    - name: generate
      image: 192.168.1.163:5000/dag-pipeline-generate:latest
      command: ["python", "task.py"]
      dependencies: []
      resources:
        cpu: "200m"
        memory: "128Mi"
      dataSize: "1MB"
      runtime: 10
      constraints:
        nodeNames:
          - anrg-1
          - anrg-3
          - anrg-5

    - name: transform
      image: 192.168.1.163:5000/dag-pipeline-transform:latest
      command: ["python", "task.py"]
      dependencies: ["generate"]
      resources:
        cpu: "300m"
        memory: "128Mi"
      dataSize: "1MB"
      runtime: 10
      constraints:
        nodeNames:
          - anrg-4
          - anrg-6
          - anrg-8

    - name: output
      image: 192.168.1.163:5000/dag-pipeline-output:latest
      command: ["python", "task.py"]
      dependencies: ["transform"]
      resources:
        cpu: "100m"
        memory: "64Mi"
      dataSize: "0"
      runtime: 2
      constraints:
        nodeNames:
          - anrg-7
          - anrg-9
