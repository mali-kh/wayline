apiVersion: wl.io/v1
kind: ODAG
metadata:
  name: ml-training
  namespace: wl-system
spec:
  scheduler: heft
  retryPolicy:
    maxRetries: 2
  tasks:
    - name: fetch-data
      image: 192.168.1.163:5000/multi-odag-task:latest
      command: ["python", "task.py"]
      dependencies: []
      resources:
        cpu: "200m"
        memory: "256Mi"
      dataSize: "100MB"
      runtime: 4
      constraints:
        nodeNames: [anrg-3, anrg-4]

    - name: preprocess
      image: 192.168.1.163:5000/multi-odag-task:latest
      command: ["python", "task.py"]
      dependencies: ["fetch-data"]
      resources:
        cpu: "300m"
        memory: "512Mi"
      dataSize: "200MB"
      runtime: 6
      constraints:
        nodeNames: [anrg-3, anrg-5]

    - name: augment
      image: 192.168.1.163:5000/multi-odag-task:latest
      command: ["python", "task.py"]
      dependencies: ["fetch-data"]
      resources:
        cpu: "300m"
        memory: "512Mi"
      dataSize: "150MB"
      runtime: 8
      constraints:
        nodeNames: [anrg-4, anrg-6]

    - name: train
      image: 192.168.1.163:5000/multi-odag-task:latest
      command: ["python", "task.py"]
      dependencies: ["preprocess", "augment"]
      resources:
        cpu: "500m"
        memory: "640Mi"
      dataSize: "50MB"
      runtime: 20
      constraints:
        nodeNames: [anrg-5, anrg-6]

    - name: evaluate
      image: 192.168.1.163:5000/multi-odag-task:latest
      command: ["python", "task.py"]
      dependencies: ["train"]
      resources:
        cpu: "200m"
        memory: "256Mi"
      dataSize: "10MB"
      runtime: 5
      constraints:
        nodeNames: [anrg-5, anrg-6]
