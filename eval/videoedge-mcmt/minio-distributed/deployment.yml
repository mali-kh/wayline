# Distributed MinIO baseline for the reviewer's "single-pod MinIO strawman"
# objection.  Four MinIO replicas spread across worker nodes, joined in
# distributed mode (erasure-coded across the four hostPath drives).
# Argo points at the same Service endpoint as before; Service load-balances
# across the four pods.  Reads/writes are spread; no single pod is a hot spot.
#
# Pods are scheduled by nodeName so each replica's data is on the named
# worker's local disk.  Anti-affinity is implicit in the per-pod node pin.
#
# Apply: kubectl apply -f deployment.yml
# Tear down: kubectl delete ns e0-bench-dist
apiVersion: v1
kind: Namespace
metadata:
  name: e0-bench-dist
---
# Headless service for MinIO's distributed peer discovery (per-pod DNS).
apiVersion: v1
kind: Service
metadata:
  name: minio-headless
  namespace: e0-bench-dist
  labels: { app: minio-dist }
spec:
  clusterIP: None
  selector:
    app: minio-dist
  ports:
    - { port: 9000, targetPort: 9000, name: api }
---
# Client-facing Service: Argo connects here, request load-balances to one
# of the four MinIO peers.
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: e0-bench-dist
  labels: { app: minio-dist }
spec:
  type: ClusterIP
  selector:
    app: minio-dist
  ports:
    - { port: 9000, targetPort: 9000, name: api }
---
# Four pods, one each on anrg-3 (sensor tier), anrg-6/7 (compute tier),
# anrg-9 (aggregation).  Each pod's DNS name is minio-N.minio-headless...
# so distributed-mode peer discovery works.  We use individual Pods with
# explicit hostname instead of a StatefulSet because k3s doesn't ship a
# dynamic hostPath provisioner.
apiVersion: v1
kind: Pod
metadata:
  name: minio-0
  namespace: e0-bench-dist
  labels: { app: minio-dist, statefulset.kubernetes.io/pod-name: minio-0 }
spec:
  hostname: minio-0
  subdomain: minio-headless
  nodeName: anrg-3
  containers:
    - name: minio
      image: quay.io/minio/minio:RELEASE.2025-01-20T14-49-07Z
      args:
        - "server"
        - "http://minio-0.minio-headless.e0-bench-dist.svc.cluster.local:9000/data"
        - "http://minio-1.minio-headless.e0-bench-dist.svc.cluster.local:9000/data"
        - "http://minio-2.minio-headless.e0-bench-dist.svc.cluster.local:9000/data"
        - "http://minio-3.minio-headless.e0-bench-dist.svc.cluster.local:9000/data"
        - "--console-address"
        - ":9001"
      env:
        - { name: MINIO_ROOT_USER,     value: "e0admin" }
        - { name: MINIO_ROOT_PASSWORD, value: "e0adminpw" }
        - { name: MINIO_BROWSER,       value: "off" }
      ports:
        - { containerPort: 9000, name: api }
      resources:
        requests: { cpu: "500m", memory: "1Gi" }
        limits:   { cpu: "2",    memory: "4Gi" }
      volumeMounts:
        - { name: data, mountPath: /data }
  volumes:
    - name: data
      hostPath: { path: /var/lib/dsf-minio-dist, type: DirectoryOrCreate }
---
