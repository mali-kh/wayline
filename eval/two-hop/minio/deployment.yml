# MinIO baseline for the E0 two-hop microbenchmark.
#
# Single pod on anrg-9 (neutral node — no S-links in matrix v2; reachable
# symmetrically from anrg-3 and anrg-6, which are the producer/consumer
# nodes for E0). No auth, no replication, no TLS — this is a closed lab
# cluster and the bench bucket is wiped per run.
#
# Apply once before E0: kubectl apply -f deployment.yml
# Teardown: kubectl delete -f deployment.yml
apiVersion: v1
kind: Namespace
metadata:
  name: e0-bench
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: e0-bench
  labels:
    app: two-hop
    component: minio
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: two-hop
      component: minio
  template:
    metadata:
      labels:
        app: two-hop
        component: minio
    spec:
      nodeSelector:
        kubernetes.io/hostname: anrg-9
      containers:
        - name: minio
          image: quay.io/minio/minio:RELEASE.2025-01-20T14-49-07Z
          args: ["server", "/data", "--console-address", ":9001"]
          env:
            - { name: MINIO_ROOT_USER,     value: "e0admin" }
            - { name: MINIO_ROOT_PASSWORD, value: "e0adminpw" }
            - { name: MINIO_BROWSER,       value: "off" }
          ports:
            - { containerPort: 9000, name: api }
            - { containerPort: 9001, name: console }
          resources:
            requests: { cpu: "500m", memory: "1Gi" }
            limits:   { cpu: "2",    memory: "4Gi" }
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: api
            periodSeconds: 5
            failureThreshold: 6
          volumeMounts:
            - { name: data, mountPath: /data }
      volumes:
        # hostPath instead of emptyDir so the bucket survives pod restarts.
        # MinIO is already nodeSelector-pinned to anrg-9, so this path is
        # always served by the same node's local disk.
        - name: data
          hostPath:
            path: /var/lib/dsf-minio-e0
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: e0-bench
  labels:
    app: two-hop
    component: minio
spec:
  type: ClusterIP
  selector:
    app: two-hop
    component: minio
  ports:
    - { name: api,     port: 9000, targetPort: 9000 }
    - { name: console, port: 9001, targetPort: 9001 }
