apiVersion: v1
kind: ConfigMap
metadata:
  name: dsf-network-profile
  namespace: wl-system
data:
  # Matches setup-tc-matrix.sh:
  #   F = 125_000_000 B/s (1 Gbps)
  #   M =  12_500_000 B/s (100 Mbps)   [v2: was 300 Mbps]
  #   S =   6_250_000 B/s ( 50 Mbps)   [v2: was 100 Mbps]
  # Bottleneck pairs: anrg-3↔anrg-6, anrg-4↔anrg-7, anrg-5↔anrg-8.
  defaultBandwidth: "125000000"

  # Edge ↔ Compute  (generic M=100Mbps, bottlenecks S=50Mbps)
  anrg-1_to_anrg-6: "12500000"
  anrg-1_to_anrg-7: "12500000"
  anrg-1_to_anrg-8: "12500000"
  anrg-1_to_anrg-9: "12500000"
  anrg-3_to_anrg-6: "6250000"
  anrg-3_to_anrg-7: "12500000"
  anrg-3_to_anrg-8: "12500000"
  anrg-3_to_anrg-9: "12500000"
  anrg-4_to_anrg-6: "12500000"
  anrg-4_to_anrg-7: "6250000"
  anrg-4_to_anrg-8: "12500000"
  anrg-4_to_anrg-9: "12500000"
  anrg-5_to_anrg-6: "12500000"
  anrg-5_to_anrg-7: "12500000"
  anrg-5_to_anrg-8: "6250000"
  anrg-5_to_anrg-9: "12500000"

  # Compute ↔ Edge (reverse direction)
  anrg-6_to_anrg-1: "12500000"
  anrg-6_to_anrg-3: "6250000"
  anrg-6_to_anrg-4: "12500000"
  anrg-6_to_anrg-5: "12500000"
  anrg-6_to_anrg-9: "12500000"
  anrg-7_to_anrg-1: "12500000"
  anrg-7_to_anrg-3: "12500000"
  anrg-7_to_anrg-4: "6250000"
  anrg-7_to_anrg-5: "12500000"
  anrg-7_to_anrg-9: "12500000"
  anrg-8_to_anrg-1: "12500000"
  anrg-8_to_anrg-3: "12500000"
  anrg-8_to_anrg-4: "12500000"
  anrg-8_to_anrg-5: "6250000"
  anrg-8_to_anrg-9: "12500000"

  # Gateway: M to everyone (both directions)
  anrg-9_to_anrg-1: "12500000"
  anrg-9_to_anrg-3: "12500000"
  anrg-9_to_anrg-4: "12500000"
  anrg-9_to_anrg-5: "12500000"
  anrg-9_to_anrg-6: "12500000"
  anrg-9_to_anrg-7: "12500000"
  anrg-9_to_anrg-8: "12500000"
