apiVersion: dsf.io/v1
kind: ODAGTemplate
metadata:
  name: iobt-eval-random
  namespace: dsf-system
spec:
  description: "IoBT eval (random scheduler): data-heavy transfers to stress network"
  scheduler: random
  profiling:
    enabled: true
    warmupRuns: 0
    minSamples: 2
    emaAlpha: 0.3
  defaults:
    runtime: 3
    dataSize: "50MB"
  retention:
    maxRuns: 20
  tasks:
    # Layer 0 — Capture (pinned, generates large raw data)
    - name: capture-1
      image: 192.168.1.163:5000/dsf-iobt-capture:latest
      command: ["python", "task.py"]
      dependencies: []
      dataSize: "150MB"
      runtime: 2
      resources:
        cpu: "200m"
        memory: "512Mi"
      constraints:
        nodeNames: [anrg-3]

    - name: capture-2
      image: 192.168.1.163:5000/dsf-iobt-capture:latest
      command: ["python", "task.py"]
      dependencies: []
      dataSize: "150MB"
      runtime: 2
      resources:
        cpu: "200m"
        memory: "512Mi"
      constraints:
        nodeNames: [anrg-4]

    - name: capture-3
      image: 192.168.1.163:5000/dsf-iobt-capture:latest
      command: ["python", "task.py"]
      dependencies: []
      dataSize: "120MB"
      runtime: 2
      resources:
        cpu: "200m"
        memory: "512Mi"
      constraints:
        nodeNames: [anrg-5]

    - name: capture-4
      image: 192.168.1.163:5000/dsf-iobt-capture:latest
      command: ["python", "task.py"]
      dependencies: []
      dataSize: "200MB"
      runtime: 2
      resources:
        cpu: "200m"
        memory: "512Mi"
      constraints:
        nodeNames: [anrg-6]

    # Layer 1 — Preprocess (co-located, produces LARGE output for cross-node transfer)
    - name: preprocess-1
      image: 192.168.1.163:5000/dsf-iobt-preprocess:latest
      command: ["python", "task.py"]
      dependencies: ["capture-1"]
      dataSize: "100MB"
      runtime: 2
      resources:
        cpu: "300m"
        memory: "512Mi"
      constraints:
        nodeNames: [anrg-3]

    - name: preprocess-2
      image: 192.168.1.163:5000/dsf-iobt-preprocess:latest
      command: ["python", "task.py"]
      dependencies: ["capture-2"]
      dataSize: "100MB"
      runtime: 2
      resources:
        cpu: "300m"
        memory: "512Mi"
      constraints:
        nodeNames: [anrg-4]

    - name: preprocess-3
      image: 192.168.1.163:5000/dsf-iobt-preprocess:latest
      command: ["python", "task.py"]
      dependencies: ["capture-3"]
      dataSize: "80MB"
      runtime: 2
      resources:
        cpu: "300m"
        memory: "512Mi"
      constraints:
        nodeNames: [anrg-5]

    - name: preprocess-4
      image: 192.168.1.163:5000/dsf-iobt-preprocess:latest
      command: ["python", "task.py"]
      dependencies: ["capture-4"]
      dataSize: "150MB"
      runtime: 2
      resources:
        cpu: "300m"
        memory: "512Mi"
      constraints:
        nodeNames: [anrg-6]

    # Layer 2 — Inference (SHORT compute, so transfer time dominates)
    - name: infer-1
      image: 192.168.1.163:5000/dsf-iobt-infer:latest
      command: ["python", "task.py"]
      dependencies: ["preprocess-1"]
      dataSize: "1MB"
      runtime: 3
      resources:
        cpu: "500m"
        memory: "512Mi"
      constraints:
        nodeNames: [anrg-3, anrg-4, anrg-5, anrg-6]

    - name: infer-2
      image: 192.168.1.163:5000/dsf-iobt-infer:latest
      command: ["python", "task.py"]
      dependencies: ["preprocess-2"]
      dataSize: "1MB"
      runtime: 3
      resources:
        cpu: "500m"
        memory: "512Mi"
      constraints:
        nodeNames: [anrg-3, anrg-4, anrg-5, anrg-6]

    - name: infer-3
      image: 192.168.1.163:5000/dsf-iobt-infer:latest
      command: ["python", "task.py"]
      dependencies: ["preprocess-3"]
      dataSize: "1MB"
      runtime: 3
      resources:
        cpu: "500m"
        memory: "512Mi"
      constraints:
        nodeNames: [anrg-3, anrg-4, anrg-5, anrg-6]

    - name: infer-4
      image: 192.168.1.163:5000/dsf-iobt-infer:latest
      command: ["python", "task.py"]
      dependencies: ["preprocess-4"]
      dataSize: "1MB"
      runtime: 3
      resources:
        cpu: "500m"
        memory: "512Mi"
      constraints:
        nodeNames: [anrg-3, anrg-4, anrg-5, anrg-6]

    # Layer 3 — Fusion
    - name: fuse-tracks
      image: 192.168.1.163:5000/dsf-iobt-fuse:latest
      command: ["python", "task.py"]
      dependencies: ["infer-1", "infer-2", "infer-3", "infer-4"]
      dataSize: "1MB"
      runtime: 2
      resources:
        cpu: "300m"
        memory: "256Mi"
      constraints:
        nodeNames: [anrg-3, anrg-4, anrg-5, anrg-6]

    # Layer 4 — Report
    - name: generate-report
      image: 192.168.1.163:5000/dsf-iobt-report:latest
      command: ["python", "task.py"]
      dependencies: ["fuse-tracks"]
      dataSize: "0"
      runtime: 1
      resources:
        cpu: "200m"
        memory: "128Mi"
      constraints:
        nodeNames: [anrg-3, anrg-4, anrg-5, anrg-6]
