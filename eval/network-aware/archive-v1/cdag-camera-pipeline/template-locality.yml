apiVersion: wl.io/v1
kind: CDAGTemplate
metadata:
  name: camera-pipeline-locality
  namespace: wl-system
spec:
  description: "Camera fusion pipeline (locality scheduler) — 5MB frames at 1Hz"
  scheduler: locality
  restartPolicy: Always
  retention:
    maxInstances: 10
  tasks:
    - name: camera-1
      image: 192.168.1.163:5000/camera-pipeline:latest
      command: ["python", "task.py"]
      replicas: 1
      dependencies: []
      dataRate: "5MB/s"
      resources:
        cpu: "200m"
        memory: "128Mi"
      constraints:
        nodeNames: [anrg-3]

    - name: camera-2
      image: 192.168.1.163:5000/camera-pipeline:latest
      command: ["python", "task.py"]
      replicas: 1
      dependencies: []
      dataRate: "5MB/s"
      resources:
        cpu: "200m"
        memory: "128Mi"
      constraints:
        nodeNames: [anrg-4]

    - name: camera-3
      image: 192.168.1.163:5000/camera-pipeline:latest
      command: ["python", "task.py"]
      replicas: 1
      dependencies: []
      dataRate: "5MB/s"
      resources:
        cpu: "200m"
        memory: "128Mi"
      constraints:
        nodeNames: [anrg-5]

    - name: camera-4
      image: 192.168.1.163:5000/camera-pipeline:latest
      command: ["python", "task.py"]
      replicas: 1
      dependencies: []
      dataRate: "5MB/s"
      resources:
        cpu: "200m"
        memory: "128Mi"
      constraints:
        nodeNames: [anrg-6]

    - name: preprocess
      image: 192.168.1.163:5000/camera-pipeline:latest
      command: ["python", "task.py"]
      replicas: 1
      dependencies: ["camera-1", "camera-2", "camera-3", "camera-4"]
      dataRate: "8MB/s"
      resources:
        cpu: "300m"
        memory: "256Mi"
      constraints:
        nodeNames: [anrg-3, anrg-4, anrg-5, anrg-6]

    - name: detector
      image: 192.168.1.163:5000/camera-pipeline:latest
      command: ["python", "task.py"]
      replicas: 1
      dependencies: ["preprocess"]
      dataRate: "2MB/s"
      resources:
        cpu: "500m"
        memory: "256Mi"
      constraints:
        nodeNames: [anrg-3, anrg-4, anrg-5, anrg-6]

    - name: tracker
      image: 192.168.1.163:5000/camera-pipeline:latest
      command: ["python", "task.py"]
      replicas: 1
      dependencies: ["detector"]
      dataRate: "500KB/s"
      resources:
        cpu: "300m"
        memory: "128Mi"
      constraints:
        nodeNames: [anrg-3, anrg-4, anrg-5, anrg-6]

    - name: alert-sink
      image: 192.168.1.163:5000/camera-pipeline:latest
      command: ["python", "task.py"]
      replicas: 1
      dependencies: ["tracker"]
      resources:
        cpu: "100m"
        memory: "64Mi"
      constraints:
        nodeNames: [anrg-3, anrg-4, anrg-5, anrg-6]

    - name: log-sink
      image: 192.168.1.163:5000/camera-pipeline:latest
      command: ["python", "task.py"]
      replicas: 1
      dependencies: ["tracker"]
      resources:
        cpu: "100m"
        memory: "64Mi"
      constraints:
        nodeNames: [anrg-3, anrg-4, anrg-5, anrg-6]
