---
# DaemonSet that mounts the NFS share on each worker node at /shared/dsf-outputs.
# This makes the NFS mount available as a hostPath from ODAG task pods.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: nfs-mount
  namespace: dsf-system
spec:
  selector:
    matchLabels:
      app: nfs-mount
  template:
    metadata:
      labels:
        app: nfs-mount
    spec:
      tolerations:
        - operator: Exists
      hostPID: true
      containers:
        - name: mounter
          image: alpine:3.19
          securityContext:
            privileged: true
          command:
            - /bin/sh
            - -c
            - |
              apk add --no-cache nfs-utils > /dev/null 2>&1
              mkdir -p /host-root/shared/dsf-outputs
              # Mount NFS. Retry until the server is ready.
              for i in $(seq 1 30); do
                mount -t nfs -o vers=3,nolock nfs-server.dsf-system.svc.cluster.local:/data/nfs-export /host-root/shared/dsf-outputs && break
                echo "[nfs-mount] attempt $i failed, retrying in 5s..."
                sleep 5
              done
              echo "[nfs-mount] NFS mounted at /shared/dsf-outputs on $(hostname)"
              # Keep running so the mount persists.
              sleep infinity
          volumeMounts:
            - name: host-root
              mountPath: /host-root
              mountPropagation: Bidirectional
      volumes:
        - name: host-root
          hostPath:
            path: /
            type: Directory
