---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mqtt-broker
  namespace: dsf-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mqtt-broker
  template:
    metadata:
      labels:
        app: mqtt-broker
    spec:
      containers:
        - name: mosquitto
          image: eclipse-mosquitto:2
          ports:
            - containerPort: 1883
          command: ["/bin/sh", "-c", "echo 'listener 1883\nallow_anonymous true' > /tmp/mosquitto.conf && mosquitto -c /tmp/mosquitto.conf -v"]
          resources:
            requests:
              cpu: "200m"
              memory: "128Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: mqtt-broker
  namespace: dsf-system
spec:
  selector:
    app: mqtt-broker
  ports:
    - port: 1883
      targetPort: 1883
  type: ClusterIP
