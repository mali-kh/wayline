---
# Mounts NFS OVER /data/dsf-outputs on each worker node.
# This makes the normal file transport + data-agent work, but all I/O
# goes through the NFS server — creating the centralized bottleneck
# we want to measure.
#
# Deploy BEFORE running NFS eval, delete AFTER to restore local storage.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: nfs-overlay
  namespace: dsf-system
spec:
  selector:
    matchLabels:
      app: nfs-overlay
  template:
    metadata:
      labels:
        app: nfs-overlay
    spec:
      tolerations:
        - operator: Exists
      hostPID: true
      containers:
        - name: mounter
          image: alpine:3.19
          securityContext:
            privileged: true
          command:
            - /bin/sh
            - -c
            - |
              apk add --no-cache nfs-utils > /dev/null 2>&1
              mkdir -p /host-root/data/dsf-outputs
              # Mount NFS over the existing /data/dsf-outputs directory.
              for i in $(seq 1 30); do
                mount -t nfs -o vers=3,nolock nfs-server.dsf-system.svc.cluster.local:/data/nfs-export /host-root/data/dsf-outputs && break
                echo "[nfs-overlay] attempt $i failed, retrying in 5s..."
                sleep 5
              done
              echo "[nfs-overlay] NFS mounted over /data/dsf-outputs on $(hostname)"
              sleep infinity
          volumeMounts:
            - name: host-root
              mountPath: /host-root
              mountPropagation: Bidirectional
      volumes:
        - name: host-root
          hostPath:
            path: /
            type: Directory
