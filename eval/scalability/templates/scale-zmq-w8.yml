apiVersion: dsf.io/v1
kind: CDAGTemplate
metadata:
  name: scale-zmq-w8
  namespace: dsf-system
spec:
  description: 'Scalability eval: ZMQ, 8 workers, 100KB, forced cross-node'
  scheduler: random
  restartPolicy: Always
  retention:
    maxInstances: 5
  tasks:
  - name: source
    image: 192.168.1.163:5000/scalability-eval:latest
    command:
    - python
    - task.py
    replicas: 1
    dependencies: []
    dataRate: 512000B/s
    env:
    - name: DSF_EVAL_MSG_SIZE
      value: '102400'
    - name: DSF_EVAL_MSG_RATE
      value: '5'
    - name: DSF_TRANSPORT_PATTERN
      value: pubsub
    resources:
      cpu: 200m
      memory: 128Mi
    constraints:
      nodeNames:
      - anrg-3
  - name: worker-1
    image: 192.168.1.163:5000/scalability-eval:latest
    command:
    - python
    - task.py
    replicas: 1
