---
# NFS server for scalability evaluation baseline.
# Deploys on anrg-3 and exports /data/nfs-export via NFS.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nfs-server
  namespace: dsf-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nfs-server
  template:
    metadata:
      labels:
        app: nfs-server
    spec:
      nodeSelector:
        kubernetes.io/hostname: anrg-3
      containers:
        - name: nfs
          image: itsthenetwork/nfs-server-alpine:12
          env:
            - name: SHARED_DIRECTORY
              value: /data/nfs-export
          ports:
            - containerPort: 2049
          securityContext:
            privileged: true
          volumeMounts:
            - name: nfs-storage
              mountPath: /data/nfs-export
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "2000m"
              memory: "1Gi"
      volumes:
        - name: nfs-storage
          hostPath:
            path: /data/nfs-export
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: nfs-server
  namespace: dsf-system
spec:
  selector:
    app: nfs-server
  ports:
    - port: 2049
      targetPort: 2049
  type: ClusterIP
