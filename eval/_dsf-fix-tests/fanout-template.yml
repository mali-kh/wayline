apiVersion: dsf.io/v1
kind: ODAGTemplate
metadata:
  name: fixf-fanout
  namespace: dsf-system
spec:
  description: >
    Smoke-tests fix F (bounded fan-out concurrency). 1 producer on anrg-3
    pushes a 30 MB payload to 4 consumers across anrg-1/4/5/6 in parallel.
    With max-concurrent-pushes=4, all four PUTs should overlap in time.
  scheduler: heft
  profiling: { enabled: false }
  defaults: { runtime: 3, dataSize: "30MB" }
  retention:
    maxRuns: 3
    data: { policy: none }
  tasks:
    - name: source
      image: 192.168.1.163:5000/multi-odag-task:latest
      command: ["python", "task.py"]
      dependencies: []
      dataSize: "30MB"
      runtime: 3
      constraints: { nodeNames: [anrg-3] }
    - name: consumer-1
      image: 192.168.1.163:5000/multi-odag-task:latest
      command: ["python", "task.py"]
      dependencies: ["source"]
      dataSize: "0"
      runtime: 2
      constraints: { nodeNames: [anrg-1] }
    - name: consumer-2
      image: 192.168.1.163:5000/multi-odag-task:latest
      command: ["python", "task.py"]
      dependencies: ["source"]
      dataSize: "0"
      runtime: 2
      constraints: { nodeNames: [anrg-4] }
    - name: consumer-3
      image: 192.168.1.163:5000/multi-odag-task:latest
      command: ["python", "task.py"]
      dependencies: ["source"]
      dataSize: "0"
      runtime: 2
      constraints: { nodeNames: [anrg-5] }
    - name: consumer-4
      image: 192.168.1.163:5000/multi-odag-task:latest
      command: ["python", "task.py"]
      dependencies: ["source"]
      dataSize: "0"
      runtime: 2
      constraints: { nodeNames: [anrg-6] }
