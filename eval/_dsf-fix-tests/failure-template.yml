apiVersion: dsf.io/v1
kind: ODAGTemplate
metadata:
  name: fix2-failure
  namespace: dsf-system
spec:
  description: >
    Smoke-tests fix #2 (controller failed-state aggregation). The 'crash'
    task exits 1 before any downstream pod can be created. Pre-fix the
    ODAG would stay Running indefinitely; with the fix it should reach
    Failed quickly with a message naming the failed task.
  scheduler: random
  profiling: { enabled: false }
  defaults: { runtime: 1, dataSize: "0" }
  retention:
    maxRuns: 5
    data: { policy: immediate }
  tasks:
    - name: crash
      image: busybox:1.36
      command: ["sh", "-c"]
      args: ["echo intentional failure; exit 1"]
      runtime: 1
      dataSize: "0"
      resources: { cpu: "100m", memory: "64Mi" }
      constraints: { nodeNames: [anrg-3] }
    - name: downstream
      image: busybox:1.36
      command: ["sh", "-c"]
      args: ["echo should never run"]
      runtime: 1
      dataSize: "0"
      resources: { cpu: "100m", memory: "64Mi" }
      dependencies: ["crash"]
      constraints: { nodeNames: [anrg-4] }
