apiVersion: dsf.io/v1
kind: ODAGTemplate
metadata:
  name: fix1-reserved-name
  namespace: dsf-system
spec:
  description: >
    Smoke-tests fix #1 reserved-name rejection. Attempts to declare a volume
    named "dsf-outputs" (a controller-owned name); the parser MUST drop it
    with a warning. Pod still runs (controller's own mount is unaffected).
  scheduler: random
  profiling:
    enabled: false
  defaults:
    runtime: 2
    dataSize: "0"
  retention:
    maxRuns: 5
    data:
      policy: immediate
  tasks:
    - name: probe
      image: busybox:1.36
      command: ["sh", "-c"]
      args:
        - |
          echo "=== mounts under /data ==="
          ls -la /data
          echo "=== expected: dsf-outputs is the controller's own hostPath, not the user override ==="
      runtime: 2
      dataSize: "0"
      resources:
        cpu: "100m"
        memory: "64Mi"
      constraints:
        nodeNames: [anrg-3]
      volumes:
        - name: dsf-outputs       # RESERVED — should be dropped
          emptyDir: {}
        - name: dsf-shared        # RESERVED — should be dropped
          emptyDir: {}
        - name: legitimate-vol    # should pass through
          emptyDir: {}
      volumeMounts:
        - name: dsf-outputs       # RESERVED — should be dropped
          mountPath: /should/not/appear
        - name: legitimate-vol    # should pass through
          mountPath: /tmp/legit
