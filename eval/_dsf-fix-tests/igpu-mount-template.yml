apiVersion: dsf.io/v1
kind: ODAGTemplate
metadata:
  name: fix1-igpu-mount
  namespace: dsf-system
spec:
  description: >
    Smoke-tests fix #1 (pod-template generalization): mounts /dev/dri via
    hostPath, joins render group 992 via supplementalGroups, and prints the
    visible iGPU device files. A single-task ODAG so success/failure is
    obvious from `kubectl logs`.
  scheduler: random
  profiling:
    enabled: false
  defaults:
    runtime: 2
    dataSize: "0"
  retention:
    maxRuns: 5
    data:
      policy: immediate
  tasks:
    - name: probe
      image: busybox:1.36
      command: ["sh", "-c"]
      args:
        - |
          set -eu
          echo "=== id ==="
          id
          echo "=== /dev/dri contents ==="
          ls -la /dev/dri
          echo "=== read access to renderD128 ==="
          if [ -r /dev/dri/renderD128 ]; then
            echo "OK: /dev/dri/renderD128 is readable by this process"
          else
            echo "FAIL: /dev/dri/renderD128 not readable"
            exit 1
          fi
          echo "=== probe done ==="
      runtime: 2
      dataSize: "0"
      resources:
        cpu: "100m"
        memory: "64Mi"
      constraints:
        nodeNames: [anrg-3]
      volumes:
        - name: dev-dri
          hostPath:
            path: /dev/dri
            type: Directory
      volumeMounts:
        - name: dev-dri
          mountPath: /dev/dri
      securityContext:
        supplementalGroups: [992]
