# Wide-pipeline-flex — Argo Workflow port.
# 10 tasks; structural stress test (fan-out x2, fan-in x2).
# Multi-candidate constraints collapsed to first-in-list deterministically.
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: e1-wpf
  namespace: argo
spec:
  entrypoint: dag
  serviceAccountName: argo
  artifactRepositoryRef:
    configMap: artifact-repositories
    key: e0bench-minio
  templates:
    - name: dag
      dag:
        tasks:
          - { name: source, template: gen1in,
              arguments: { parameters: [
                { name: tname, value: source }, { name: dsize, value: "100000000" }, { name: rtime, value: "3" }, { name: node, value: anrg-1 } ] } }

          - { name: extract, template: gen1in, dependencies: [ source ],
              arguments: { parameters: [
                { name: tname, value: extract }, { name: dsize, value: "50000000" }, { name: rtime, value: "4" }, { name: node, value: anrg-3 } ],
                artifacts: [ { name: in-0, from: "{{tasks.source.outputs.artifacts.payload}}" } ] } }
          - { name: scan, template: gen1in, dependencies: [ source ],
              arguments: { parameters: [
                { name: tname, value: scan }, { name: dsize, value: "50000000" }, { name: rtime, value: "4" }, { name: node, value: anrg-4 } ],
                artifacts: [ { name: in-0, from: "{{tasks.source.outputs.artifacts.payload}}" } ] } }
          - { name: index, template: gen1in, dependencies: [ source ],
              arguments: { parameters: [
                { name: tname, value: index }, { name: dsize, value: "50000000" }, { name: rtime, value: "4" }, { name: node, value: anrg-5 } ],
                artifacts: [ { name: in-0, from: "{{tasks.source.outputs.artifacts.payload}}" } ] } }

          - { name: merge, template: gen3in, dependencies: [ extract, scan, index ],
              arguments: { parameters: [
                { name: tname, value: merge }, { name: dsize, value: "100000000" }, { name: rtime, value: "3" }, { name: node, value: anrg-6 } ],
                artifacts: [
                  { name: in-0, from: "{{tasks.extract.outputs.artifacts.payload}}" },
                  { name: in-1, from: "{{tasks.scan.outputs.artifacts.payload}}" },
                  { name: in-2, from: "{{tasks.index.outputs.artifacts.payload}}" } ] } }

          - { name: filter-a, template: gen1in, dependencies: [ merge ],
              arguments: { parameters: [
                { name: tname, value: filter-a }, { name: dsize, value: "30000000" }, { name: rtime, value: "3" }, { name: node, value: anrg-6 } ],
                artifacts: [ { name: in-0, from: "{{tasks.merge.outputs.artifacts.payload}}" } ] } }
          - { name: filter-b, template: gen1in, dependencies: [ merge ],
              arguments: { parameters: [
                { name: tname, value: filter-b }, { name: dsize, value: "30000000" }, { name: rtime, value: "3" }, { name: node, value: anrg-7 } ],
                artifacts: [ { name: in-0, from: "{{tasks.merge.outputs.artifacts.payload}}" } ] } }
          - { name: filter-c, template: gen1in, dependencies: [ merge ],
              arguments: { parameters: [
                { name: tname, value: filter-c }, { name: dsize, value: "30000000" }, { name: rtime, value: "3" }, { name: node, value: anrg-8 } ],
                artifacts: [ { name: in-0, from: "{{tasks.merge.outputs.artifacts.payload}}" } ] } }

          - { name: aggregate, template: gen3in, dependencies: [ filter-a, filter-b, filter-c ],
              arguments: { parameters: [
                { name: tname, value: aggregate }, { name: dsize, value: "10000000" }, { name: rtime, value: "2" }, { name: node, value: anrg-6 } ],
                artifacts: [
                  { name: in-0, from: "{{tasks.filter-a.outputs.artifacts.payload}}" },
                  { name: in-1, from: "{{tasks.filter-b.outputs.artifacts.payload}}" },
                  { name: in-2, from: "{{tasks.filter-c.outputs.artifacts.payload}}" } ] } }

          - { name: output, template: gen1in, dependencies: [ aggregate ],
              arguments: { parameters: [
                { name: tname, value: output }, { name: dsize, value: "0" }, { name: rtime, value: "1" }, { name: node, value: anrg-9 } ],
                artifacts: [ { name: in-0, from: "{{tasks.aggregate.outputs.artifacts.payload}}" } ] } }

    - name: gen1in
      inputs:
        parameters: [ { name: tname }, { name: dsize }, { name: rtime }, { name: node } ]
        artifacts:  [ { name: in-0, optional: true, path: /in/in-0/output } ]
      nodeSelector: { kubernetes.io/hostname: "{{inputs.parameters.node}}" }
      container:
        image: 192.168.1.163:5000/e1-argo-tasks:latest
        imagePullPolicy: Always
        command: [ python, /app/generic.py ]
        env:
          - { name: E1_TASK_NAME, value: "{{inputs.parameters.tname}}" }
          - { name: E1_DATA_SIZE, value: "{{inputs.parameters.dsize}}" }
          - { name: E1_RUNTIME,   value: "{{inputs.parameters.rtime}}" }
          - { name: NODE_NAME,    valueFrom: { fieldRef: { fieldPath: spec.nodeName } } }
        resources:
          requests: { cpu: 200m, memory: 256Mi }
      outputs:
        artifacts:
          - { name: payload, path: /out/output, archive: { none: {} } }

    - name: gen3in
      inputs:
        parameters: [ { name: tname }, { name: dsize }, { name: rtime }, { name: node } ]
        artifacts:
          - { name: in-0, path: /in/in-0/output }
          - { name: in-1, path: /in/in-1/output }
          - { name: in-2, path: /in/in-2/output }
      nodeSelector: { kubernetes.io/hostname: "{{inputs.parameters.node}}" }
      container:
        image: 192.168.1.163:5000/e1-argo-tasks:latest
        imagePullPolicy: Always
        command: [ python, /app/generic.py ]
        env:
          - { name: E1_TASK_NAME, value: "{{inputs.parameters.tname}}" }
          - { name: E1_DATA_SIZE, value: "{{inputs.parameters.dsize}}" }
          - { name: E1_RUNTIME,   value: "{{inputs.parameters.rtime}}" }
          - { name: NODE_NAME,    valueFrom: { fieldRef: { fieldPath: spec.nodeName } } }
        resources:
          requests: { cpu: 200m, memory: 256Mi }
      outputs:
        artifacts:
          - { name: payload, path: /out/output, archive: { none: {} } }
