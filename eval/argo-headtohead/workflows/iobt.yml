# IoBT Mission Snapshot — Argo Workflow port.
#
# Mirrors examples/iobt-mission-snapshot-odag (and matrix-v2 templates).
# 14 tasks, 5 stages:
#   capture-1..4 -> preprocess-1..4 -> infer-1..4 -> fuse-tracks -> generate-report
#
# Node pinning mirrors DSF's constraints.nodeNames via nodeSelector:
#   capture-i / preprocess-i on the respective sensor node (anrg-1/3/4/5)
#   infer-i across the compute tier (anrg-6/7/8)
#   fuse-tracks  on anrg-7/8 (we pick anrg-8 here; Argo nodeSelector cannot
#                              encode a set, so we collapse to a single host)
#   generate-report on anrg-9
#
# All artifacts pushed/pulled through the bound artifact repository
# (workflow-level), which is the e0-bench MinIO on anrg-9.
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: e1-iobt
  namespace: argo
spec:
  entrypoint: dag
  serviceAccountName: argo
  artifactRepositoryRef:
    configMap: artifact-repositories
    key: e0bench-minio
  templates:

    # ---------------- DAG -----------------------------------------
    - name: dag
      dag:
        tasks:
          - { name: capture-1,  template: capture,  arguments: { parameters: [ { name: tname, value: capture-1 }, { name: dsize, value: "100000000" }, { name: rtime, value: "3" }, { name: node, value: anrg-1 } ] } }
          - { name: capture-2,  template: capture,  arguments: { parameters: [ { name: tname, value: capture-2 }, { name: dsize, value: "120000000" }, { name: rtime, value: "3" }, { name: node, value: anrg-3 } ] } }
          - { name: capture-3,  template: capture,  arguments: { parameters: [ { name: tname, value: capture-3 }, { name: dsize, value:  "80000000" }, { name: rtime, value: "3" }, { name: node, value: anrg-4 } ] } }
          - { name: capture-4,  template: capture,  arguments: { parameters: [ { name: tname, value: capture-4 }, { name: dsize, value: "150000000" }, { name: rtime, value: "3" }, { name: node, value: anrg-5 } ] } }

          - { name: preprocess-1, template: preprocess, dependencies: [ capture-1 ],
              arguments: { parameters: [ { name: tname, value: preprocess-1 }, { name: dsize, value: "100000000" }, { name: rtime, value: "4" }, { name: node, value: anrg-1 } ],
                           artifacts:  [ { name: in,    from: "{{tasks.capture-1.outputs.artifacts.payload}}" } ] } }
          - { name: preprocess-2, template: preprocess, dependencies: [ capture-2 ],
              arguments: { parameters: [ { name: tname, value: preprocess-2 }, { name: dsize, value: "120000000" }, { name: rtime, value: "4" }, { name: node, value: anrg-3 } ],
                           artifacts:  [ { name: in,    from: "{{tasks.capture-2.outputs.artifacts.payload}}" } ] } }
          - { name: preprocess-3, template: preprocess, dependencies: [ capture-3 ],
              arguments: { parameters: [ { name: tname, value: preprocess-3 }, { name: dsize, value:  "80000000" }, { name: rtime, value: "4" }, { name: node, value: anrg-4 } ],
                           artifacts:  [ { name: in,    from: "{{tasks.capture-3.outputs.artifacts.payload}}" } ] } }
          - { name: preprocess-4, template: preprocess, dependencies: [ capture-4 ],
              arguments: { parameters: [ { name: tname, value: preprocess-4 }, { name: dsize, value: "150000000" }, { name: rtime, value: "4" }, { name: node, value: anrg-5 } ],
                           artifacts:  [ { name: in,    from: "{{tasks.capture-4.outputs.artifacts.payload}}" } ] } }

          # infer-i: Argo nodeSelector is a single hostname; we mirror DSF's
          # 3-candidate constraint by spreading the four infer tasks across
          # the three compute nodes deterministically.
          - { name: infer-1, template: infer, dependencies: [ preprocess-1 ],
              arguments: { parameters: [ { name: tname, value: infer-1 }, { name: rtime, value: "10" }, { name: node, value: anrg-6 } ],
                           artifacts:  [ { name: in,    from: "{{tasks.preprocess-1.outputs.artifacts.payload}}" } ] } }
          - { name: infer-2, template: infer, dependencies: [ preprocess-2 ],
              arguments: { parameters: [ { name: tname, value: infer-2 }, { name: rtime, value: "10" }, { name: node, value: anrg-7 } ],
                           artifacts:  [ { name: in,    from: "{{tasks.preprocess-2.outputs.artifacts.payload}}" } ] } }
          - { name: infer-3, template: infer, dependencies: [ preprocess-3 ],
              arguments: { parameters: [ { name: tname, value: infer-3 }, { name: rtime, value: "10" }, { name: node, value: anrg-8 } ],
                           artifacts:  [ { name: in,    from: "{{tasks.preprocess-3.outputs.artifacts.payload}}" } ] } }
          - { name: infer-4, template: infer, dependencies: [ preprocess-4 ],
              arguments: { parameters: [ { name: tname, value: infer-4 }, { name: rtime, value: "10" }, { name: node, value: anrg-6 } ],
                           artifacts:  [ { name: in,    from: "{{tasks.preprocess-4.outputs.artifacts.payload}}" } ] } }

          - { name: fuse-tracks, template: fuse, dependencies: [ infer-1, infer-2, infer-3, infer-4 ],
              arguments: { parameters: [ { name: tname, value: fuse-tracks }, { name: node, value: anrg-8 } ],
                           artifacts:  [
                             { name: in-1, from: "{{tasks.infer-1.outputs.artifacts.payload}}" },
                             { name: in-2, from: "{{tasks.infer-2.outputs.artifacts.payload}}" },
                             { name: in-3, from: "{{tasks.infer-3.outputs.artifacts.payload}}" },
                             { name: in-4, from: "{{tasks.infer-4.outputs.artifacts.payload}}" } ] } }

          - { name: generate-report, template: report, dependencies: [ fuse-tracks ],
              arguments: { parameters: [ { name: tname, value: generate-report }, { name: node, value: anrg-9 } ],
                           artifacts:  [ { name: in, from: "{{tasks.fuse-tracks.outputs.artifacts.payload}}" } ] } }

    # ---------------- per-stage container templates ---------------
    - name: capture
      inputs:
        parameters: [ { name: tname }, { name: dsize }, { name: rtime }, { name: node } ]
      nodeSelector: { kubernetes.io/hostname: "{{inputs.parameters.node}}" }
      container:
        image: 192.168.1.163:5000/e1-argo-tasks:latest
        imagePullPolicy: Always
        command: [ python, /app/capture.py ]
        env:
          - { name: E1_TASK_NAME, value: "{{inputs.parameters.tname}}" }
          - { name: E1_DATA_SIZE, value: "{{inputs.parameters.dsize}}" }
          - { name: E1_RUNTIME,   value: "{{inputs.parameters.rtime}}" }
          - { name: NODE_NAME,    valueFrom: { fieldRef: { fieldPath: spec.nodeName } } }
        resources:
          requests: { cpu: 200m, memory: 768Mi }
      outputs:
        artifacts:
          - { name: payload, path: /out/output, archive: { none: {} } }

    - name: preprocess
      inputs:
        parameters: [ { name: tname }, { name: dsize }, { name: rtime }, { name: node } ]
        artifacts:  [ { name: in, path: /in/upstream/output } ]
      nodeSelector: { kubernetes.io/hostname: "{{inputs.parameters.node}}" }
      container:
        image: 192.168.1.163:5000/e1-argo-tasks:latest
        imagePullPolicy: Always
        command: [ python, /app/preprocess.py ]
        env:
          - { name: E1_TASK_NAME, value: "{{inputs.parameters.tname}}" }
          - { name: E1_DATA_SIZE, value: "{{inputs.parameters.dsize}}" }
          - { name: E1_RUNTIME,   value: "{{inputs.parameters.rtime}}" }
          - { name: NODE_NAME,    valueFrom: { fieldRef: { fieldPath: spec.nodeName } } }
        resources:
          requests: { cpu: 300m, memory: 768Mi }
      outputs:
        artifacts:
          - { name: payload, path: /out/output, archive: { none: {} } }

    - name: infer
      inputs:
        parameters: [ { name: tname }, { name: rtime }, { name: node } ]
        artifacts:  [ { name: in, path: /in/upstream/output } ]
      nodeSelector: { kubernetes.io/hostname: "{{inputs.parameters.node}}" }
      container:
        image: 192.168.1.163:5000/e1-argo-tasks:latest
        imagePullPolicy: Always
        command: [ python, /app/infer.py ]
        env:
          - { name: E1_TASK_NAME, value: "{{inputs.parameters.tname}}" }
          - { name: E1_RUNTIME,   value: "{{inputs.parameters.rtime}}" }
          - { name: NODE_NAME,    valueFrom: { fieldRef: { fieldPath: spec.nodeName } } }
        resources:
          requests: { cpu: 500m, memory: 768Mi }
      outputs:
        artifacts:
          - { name: payload, path: /out/output, archive: { none: {} } }

    - name: fuse
      inputs:
        parameters: [ { name: tname }, { name: node } ]
        artifacts:
          - { name: in-1, path: /in/in-1/output }
          - { name: in-2, path: /in/in-2/output }
          - { name: in-3, path: /in/in-3/output }
          - { name: in-4, path: /in/in-4/output }
      nodeSelector: { kubernetes.io/hostname: "{{inputs.parameters.node}}" }
      container:
        image: 192.168.1.163:5000/e1-argo-tasks:latest
        imagePullPolicy: Always
        command: [ python, /app/fuse.py ]
        env:
          - { name: E1_TASK_NAME, value: "{{inputs.parameters.tname}}" }
          - { name: NODE_NAME,    valueFrom: { fieldRef: { fieldPath: spec.nodeName } } }
        resources:
          requests: { cpu: 300m, memory: 512Mi }
      outputs:
        artifacts:
          - { name: payload, path: /out/output, archive: { none: {} } }

    - name: report
      inputs:
        parameters: [ { name: tname }, { name: node } ]
        artifacts:  [ { name: in, path: /in/upstream/output } ]
      nodeSelector: { kubernetes.io/hostname: "{{inputs.parameters.node}}" }
      container:
        image: 192.168.1.163:5000/e1-argo-tasks:latest
        imagePullPolicy: Always
        command: [ python, /app/report.py ]
        env:
          - { name: E1_TASK_NAME, value: "{{inputs.parameters.tname}}" }
          - { name: NODE_NAME,    valueFrom: { fieldRef: { fieldPath: spec.nodeName } } }
        resources:
          requests: { cpu: 200m, memory: 256Mi }
      outputs:
        artifacts:
          - { name: payload, path: /out/output, archive: { none: {} } }
