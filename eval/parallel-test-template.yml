apiVersion: dsf.io/v1
kind: ODAGTemplate
metadata:
  name: parallel-test
  namespace: dsf-system
spec:
  description: "4 independent tasks on anrg-3 → sink on anrg-4 (tests parallel Gantt stacking)"
  scheduler: heft
  profiling:
    enabled: true
  defaults:
    runtime: 5
    dataSize: "10MB"
  retention:
    maxRuns: 5
  tasks:
    - name: task-a
      image: 192.168.1.163:5000/parallel-test:latest
      dependencies: []
      dataSize: "10MB"
      runtime: 5
      resources:
        cpu: "200m"
        memory: "128Mi"
      constraints:
        nodeNames: [anrg-3]

    - name: task-b
      image: 192.168.1.163:5000/parallel-test:latest
      dependencies: []
      dataSize: "10MB"
      runtime: 3
      resources:
        cpu: "200m"
        memory: "128Mi"
      constraints:
        nodeNames: [anrg-3]

    - name: task-c
      image: 192.168.1.163:5000/parallel-test:latest
      dependencies: []
      dataSize: "10MB"
      runtime: 4
      resources:
        cpu: "200m"
        memory: "128Mi"
      constraints:
        nodeNames: [anrg-3]

    - name: task-d
      image: 192.168.1.163:5000/parallel-test:latest
      dependencies: []
      dataSize: "10MB"
      runtime: 6
      resources:
        cpu: "200m"
        memory: "128Mi"
      constraints:
        nodeNames: [anrg-3]

    - name: sink
      image: 192.168.1.163:5000/parallel-test:latest
      dependencies: ["task-a", "task-b", "task-c", "task-d"]
      dataSize: "0"
      runtime: 2
      resources:
        cpu: "200m"
        memory: "128Mi"
      constraints:
        nodeNames: [anrg-4]
